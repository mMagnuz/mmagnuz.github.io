<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOVI</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }

        video,
        canvas {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #000;
        }

        /* O canvas (uma tela em branco que vai receber uma imagem) começa escondido, não existe foto ainda */
        canvas {
            display: none;
        }

        button {
            padding: 18px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }

        button:active {
            background-color: #0056b3;
        }

        #modalGaleria {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .foto-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .foto-card:hover {
            transform: scale(1.05);
        }

        .foto-card img {
            border-radius: 8px;
            display: block;
        }

        .btn-excluir {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <h1>Câmera</h1>

    <video id="visor" autoplay playsinline></video>

    <button id="btnCapturar">Tirar Foto</button>
    <button id="btnInverterCamera" style="margin-top: 20px;">Inverter Câmera</button>

    <canvas id="fotoRevelada"></canvas>

    <h2 id="textoResultado">Aguardando...</h2>

    <button id="btnAbrirGaleria">Ver Galeria</button>

    <div id="modalGaleria"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; z-index: 1000;">
        <button id="btnFecharGaleria" style="margin: 20px;">Fechar</button>
        <div id="filtros" style="margin-bottom: 20px;">
            <button onclick="filtrarGaleria('Tudo')">Tudo</button>
            <button onclick="filtrarGaleria('pessoas')">Pessoas</button>
            <button onclick="filtrarGaleria('animais')">Animais</button>
            <button onclick="filtrarGaleria('objetos')">Objetos</button>
            <button onclick="filtrarGaleria('Desconhecido')">Desconhecidos</button>
        </div>
        <div id="fotosSalvas" style="display: flex; flex-wrap: wrap; padding: 20px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script src="js/app.js"></script>
</body>

</html>
