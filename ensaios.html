<html lang="pt-br">

<head>

<body class="ensaios-page">
    <div id="smooth-wrapper">
        <div id="smooth-content">
            <main class="ensaios-shell">
                <section class="ensaios-intro">
                    <a class="ensaios-back" href="index.html">Voltar para o início</a>
                    <p class="ensaios-kicker">Ensaios</p>
                    <h1 class="fonteEspecial">Uma seleção de fotos de ensaios</h1>
                    <p>
                        Cada foto pensada para criar um visual mais natural e autêntico, capturando a essência de cada
                        momento. Seja em ambientes externos ou internos, cada clique é uma expressão única de emoção e
                        beleza.
                    </p>
                </section>

                <section class="ensaios-gallery portfolio-gallery" aria-label="Galeria de ensaios fotográficos">
                    <figure class="gallery-item"><img src="img/ensaio1.webp" alt="Ensaio fotográfico 1" loading="lazy"
                            decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/pCasamento1.webp"
                            alt="Registro fotográfico de casamento 1" loading="lazy" decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/eventos1.webp" alt="Cobertura de evento 1" loading="lazy"
                            decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/ensaio2.webp" alt="Ensaio fotográfico 2" loading="lazy"
                            decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/pCasamento2.webp"
                            alt="Registro fotográfico de casamento 2" loading="lazy" decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/eventos2.webp" alt="Cobertura de evento 2" loading="lazy"
                            decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/ensaio3.webp" alt="Ensaio fotográfico 3" loading="lazy"
                            decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/pCasamento4.webp"
                            alt="Registro fotográfico de casamento 4" loading="lazy" decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/eventos4.webp" alt="Cobertura de evento 4" loading="lazy"

                    <figure class="gallery-item"><img src="img/pCasamento3.webp"
                            alt="Registro fotográfico de casamento 3" loading="lazy" decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/eventos3.webp" alt="Cobertura de evento 3" loading="lazy"
                            decoding="async" /></figure>
                    <figure class="gallery-item"><img src="img/ensaio4.webp" alt="Ensaio fotográfico 4" loading="lazy"
                            decoding="async" /></figure>
                </section>
            </main>
        </div>
    </div>
